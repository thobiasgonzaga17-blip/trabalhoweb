<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Portfólio</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #0f172a;
      color: #e2e8f0;
    }

    header {
      background: #020617;
      padding: 20px;
      text-align: center;
    }

    header h1 {
      color: #38bdf8;
    }

    nav a {
      margin: 0 10px;
      color: #e2e8f0;
      text-decoration: none;
      font-weight: 500;
    }

    nav a:hover {
      color: #38bdf8;
    }

    section {
      padding: 40px;
      max-width: 1000px;
      margin: auto;
    }

    .card {
      background: #020617;
      padding: 20px;
      margin-top: 20px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    .portfolio img {
      width: 100%;
      border-radius: 10px;
      margin-top: 10px;
    }

    form input, form textarea {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 6px;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #38bdf8;
      color: #020617;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #0ea5e9;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #020617;
      margin-top: 30px;
    }
  </style>
</head>
<body>

</body>
</html>
